name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  contract:
    name: Soroban Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build contract
        run: cargo build -p onboarding-bridge --release

      - name: Build WASM (release)
        run: cargo build -p onboarding-bridge --release --target wasm32-unknown-unknown

      - name: Run contract tests
        run: cargo test -p onboarding-bridge --features testutils

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-bridge-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: sdk/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('sdk/package.json') }}

      - name: Install dependencies
        run: npm install

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build SDK
        run: npm run build
